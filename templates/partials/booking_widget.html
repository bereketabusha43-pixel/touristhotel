<div class="booking-widget">
    <form action="{% url 'booking:search' %}" method="get" class="row g-3 align-items-end">
        <div class="col-md-3">
            <label for="check_in" class="form-label">Check-in</label>
            <input type="date" name="check_in" id="check_in" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label for="check_out" class="form-label">Check-out</label>
            <input type="date" name="check_out" id="check_out" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label for="adults" class="form-label">Guests</label>
            <input type="number" name="adults" id="adults" class="form-control" value="2" min="1" max="10">
        </div>
        <div class="col-md-2">
            <label for="num_rooms" class="form-label">Rooms</label>
            <input type="number" name="num_rooms" id="num_rooms" class="form-control" value="1" min="1" max="5">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-search me-1"></i> Search
            </button>
        </div>
    </form>
</div>

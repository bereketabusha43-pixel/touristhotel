<div class="testimonial-card">
    <div class="testimonial-rating">
        {% for i in "12345" %}
        <i class="bi bi-star{% if forloop.counter <= testimonial.rating %}-fill{% endif %}"></i>
        {% endfor %}
    </div>
    <p class="testimonial-text">"{{ testimonial.content|truncatechars:200 }}"</p>
    <div class="testimonial-author">
        {% if testimonial.photo %}
        <img src="{{ testimonial.photo.url }}" alt="{{ testimonial.guest_name }}" class="author-photo" loading="lazy">
        {% endif %}
        <div>
            <strong>{{ testimonial.guest_name }}</strong>
            {% if testimonial.country %}<span class="text-muted">{{ testimonial.country }}</span>{% endif %}
        </div>
    </div>
</div>

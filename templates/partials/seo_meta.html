{% load static %}
<meta name="description" content="{% block meta_description %}{{ site_settings.meta_description|default:site_settings.tagline }}{% endblock %}">
<meta name="keywords" content="{% block meta_keywords %}Arba Minch hotel, Ethiopia hotel, luxury hotel, tourist hotel, Southern Ethiopia{% endblock %}">
<link rel="canonical" href="{% block canonical %}{{ request.build_absolute_uri }}{% endblock %}">

<!-- Open Graph -->
<meta property="og:type" content="{% block og_type %}website{% endblock %}">
<meta property="og:title" content="{% block og_title %}{% block page_title %}{{ site_settings.hotel_name }}{% endblock %}{% endblock %}">
<meta property="og:description" content="{% block og_description %}{{ site_settings.meta_description|default:site_settings.tagline }}{% endblock %}">
<meta property="og:url" content="{{ request.build_absolute_uri }}">
<meta property="og:site_name" content="{{ site_settings.hotel_name }}">
{% block og_image %}<meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'images/og-default.jpg' %}">{% endblock %}

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% block twitter_title %}{{ site_settings.hotel_name }}{% endblock %}">
<meta name="twitter:description" content="{% block twitter_description %}{{ site_settings.tagline }}{% endblock %}">

{% include 'partials/schema_hotel.html' %}
